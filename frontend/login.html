<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acceso - C.A.C. PANGOA</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #F4F6F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* Contenedor Principal: Rectángulo mediano */
        .login-container { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex; 
            max-width: 700px; 
            width: 95%; 
            height: 500px; 
            overflow: hidden; 
        }
        
        /* Panel Izquierdo con imagen */
        .panel-izquierdo { 
            background-image: linear-gradient(rgba(30, 70, 32, 0.8), rgba(44, 94, 59, 0.8)), url('src/imagen.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white; 
            width: 50%; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end;
        }
        
        
        /* Panel Derecho */
        .panel-derecho { 
            width: 50%; 
            padding: 20px 40px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        .panel-izquierdo h2 {
    font-size: 22px; 
    margin-bottom: 15px;
    font-weight: bold;
}

.panel-izquierdo p {
    font-size: 13px;       /* Tamaño más pequeño */
    line-height: 1.5;      /* Interlineado cómodo */
    opacity: 0.9;          /* Ligera transparencia para elegancia */
    max-width: 90%;        /* Limita el ancho del texto */
}

        .logo-container { 
            margin-bottom: 10px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
        }
        .logo-container img { 
            max-height: 110px; 
            width: auto; 
            display: block; 
        }
        
        
        .panel-derecho h2 { color: #2C3E50; font-size: 20px; margin-bottom: 5px; font-weight: bold; text-align: center; }
        .panel-derecho .sub { color: #7F8C8D; font-size: 13px; margin-bottom: 20px; text-align: center; }
        
        /* Formularios */
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group label { color: #2C3E50; font-weight: bold; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input { padding: 10px 15px; border: 1px solid #BDC3C7; border-radius: 6px; font-size: 13px; outline: none; width: 100%; }
        .form-group input:focus { border-color: #2C5E3B; }
        
        /* Botón */
        .btn-ingresar { background-color: #1E4620; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-ingresar:hover { background-color: #143016; }
        
        .footer-text { margin-top: 20px; text-align: center; color: #BDC3C7; font-size: 10px; }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; height: auto; }
            .panel-izquierdo { width: 100%; min-height: 150px; }
            .panel-derecho { width: 100%; padding: 30px; }
        }
        
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="panel-izquierdo">
            <h2>Sistema - Web 1.0</h2>
            
            <p>Orquestando el futuro del control de calidad con claridad analítica y eficiencia operativa.</p>
        </div>

        <div class="panel-derecho">
            <div class="logo-container">
               <img id="imgLogo" src="src/logo.png" alt="CAC PANGOA" onerror="this.style.display='none';">
                <h2 id="txtTituloAlternativo" style="color: #1E4620; font-size: 26px; display: inline-block;">Café Control</h2>
            </div>

            <h2>Portal de Acceso</h2>
            <p class="sub">Ingreso seguro para gestores y socios operativos.</p>

            <div class="form-group">
                <label for="txtUsuario">Usuario</label>
                <input type="text" id="txtUsuario" placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="txtContrasena">Contraseña</label>
                <input type="password" id="txtContrasena" placeholder="••••••••••••">
            </div>

            <button type="button" class="btn-ingresar" id="btnIniciar">
                Iniciar Sesión &rarr;
            </button>

            <p class="footer-text">© 2026 Sistema S.A. - Todos los derechos reservados.<br>Precisión en cada proceso analítico.</p>
        </div>
    </div>

    <script>
        // Si tu logo se carga correctamente, este script oculta de forma automática el texto de respaldo para que luzca perfecto
        const img = document.getElementById('imgLogo');
        img.onload = function() {
            document.getElementById('txtTituloAlternativo').style.display = 'none';
        };

        // Lógica de autenticación vinculada a la API unificada
        document.getElementById('btnIniciar').addEventListener('click', async function() {
            const user = document.getElementById('txtUsuario').value;
            const pass = document.getElementById('txtContrasena').value;

            if (!user || !pass) {
                alert('Por favor, rellene todos los campos requeridos.');
                return;
            }

            const payload = { username: user, password: pass };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    // Almacenamos el operador de forma local para la auditoría posterior
                    localStorage.setItem('usuarioCafe', data.username);
                    // Redirección directa al módulo predictivo
                    window.location.href = 'predictor.html';
                } else {
                    alert('Credenciales inválidas. Intente con admin / admin123');
                }
            } catch (error) {
                alert('Error al intentar conectar con el servidor.');
            }
        });
    </script>
</body>
</html>
